services:
  - type: web
    name: brimble-pipeline
    runtime: node
    repo: https://github.com/divineshedrack33220/brimble-pipeline
    plan: free
    buildCommand: |
      cd frontend && yarn install && yarn run build
      cd ../backend && yarn install && yarn run build
    startCommand: cd backend && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000